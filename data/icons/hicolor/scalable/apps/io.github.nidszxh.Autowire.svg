<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1AADA8"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D6EAF8" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="128" height="128" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Top waveform (output) -->
  <g clip-path="url(#rounded)">
    <polyline
      points="12,44 22,30 30,44 38,22 46,44 54,34 62,44 70,44"
      fill="none"
      stroke="url(#fg)"
      stroke-width="5.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- Routing arrow curving from top-wave end to bottom-wave start -->
    <path
      d="M 70,44 Q 90,44 90,64 Q 90,84 70,84"
      fill="none"
      stroke="url(#fg)"
      stroke-width="5.5"
      stroke-linecap="round"
      stroke-dasharray="0"/>

    <!-- Arrowhead pointing left into bottom wave -->
    <polygon
      points="70,78 63,84 70,90"
      fill="white"/>

    <!-- Bottom waveform (input) -->
    <polyline
      points="70,84 78,84 86,72 94,96 102,72 110,84 118,78 126,84"
      fill="none"
      stroke="url(#fg)"
      stroke-width="5.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>
</svg>
