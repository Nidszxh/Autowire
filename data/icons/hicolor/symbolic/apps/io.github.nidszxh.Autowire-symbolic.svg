<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!--
    Symbolic icon — single-color, uses the currentColor convention.
    GNOME Shell replaces the fill color at runtime.
  -->

  <!-- Top waveform -->
  <polyline
    points="1,5.5 2.5,3.5 3.5,5.5 5,1.5 6.5,5.5 7.5,4.5 8.5,5.5 9,5.5"
    fill="none"
    stroke="currentColor"
    stroke-width="1.1"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Routing arc -->
  <path
    d="M 9,5.5 Q 11.5,5.5 11.5,8 Q 11.5,10.5 9,10.5"
    fill="none"
    stroke="currentColor"
    stroke-width="1.1"
    stroke-linecap="round"/>

  <!-- Arrowhead -->
  <polygon points="9,9.3 7.2,10.5 9,11.7" fill="currentColor"/>

  <!-- Bottom waveform -->
  <polyline
    points="9,10.5 10,10.5 11,8.5 12.5,13 14,8.5 15,10.5"
    fill="none"
    stroke="currentColor"
    stroke-width="1.1"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
